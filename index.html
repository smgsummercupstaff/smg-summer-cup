<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMG SUMMER CUP</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg,#1e3c72,#2a5298);
    color: #333;
}
header {
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 30px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
section {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}
h2 {
    margin-top: 0;
    border-bottom: 2px solid #eee;
    padding-bottom: 5px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
th {
    background: #2a5298;
    color: white;
}
th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}
tr:hover {
    background: #f1f1f1;
}
input {
    width: 50px;
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background: #2a5298;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #1e3c72;
}
.team {
    display: flex;
    align-items: center;
    gap: 8px;
}
.team img {
    width: 25px;
    height: 25px;
    border-radius: 50%;
}
.sponsors {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}
.sponsor {
    background: #f5f5f5;
    padding: 15px;
    border-radius: 10px;
    min-width: 120px;
    text-align: center;
}
@media (max-width:600px) {
    table { font-size: 12px; }
}
</style>
</head>

<body>

<header>
    <h1>🏆 SMG SUMMER CUP</h1>
    <p>Calcio a 6 – 12 Squadre</p>
</header>

<section>
<h2>🏟 Partite Gironi</h2>
<table>
<tr>
    <th>Squadra A</th>
    <th>Squadra B</th>
    <th>Gol A</th>
    <th>Gol B</th>
    <th>Salva</th>
</tr>

<tr>
<td class="team"><img src="https://via.placeholder.com/25">Squadra 1</td>
<td class="team"><img src="https://via.placeholder.com/25">Squadra 2</td>
<td><input id="a1"></td>
<td><input id="b1"></td>
<td><button onclick="aggiorna('Squadra 1','Squadra 2','a1','b1')">OK</button></td>
</tr>

<tr>
<td class="team"><img src="https://via.placeholder.com/25">Squadra 3</td>
<td class="team"><img src="https://via.placeholder.com/25">Squadra 4</td>
<td><input id="a2"></td>
<td><input id="b2"></td>
<td><button onclick="aggiorna('Squadra 3','Squadra 4','a2','b2')">OK</button></td>
</tr>

</table>
</section>

<section>
<h2>📊 Classifica Generale</h2>
<table id="classifica"></table>
<br>
<button onclick="resetta()">🔄 Reset Classifica</button>
</section>

<script>
let dati = JSON.parse(localStorage.getItem("smg")) || {};

function aggiorna(a,b,ga,gb) {
    let gA = parseInt(document.getElementById(ga).value);
    let gB = parseInt(document.getElementById(gb).value);
    if (isNaN(gA) || isNaN(gB)) return;

    if (!dati[a]) dati[a] = {p:0,gf:0,gs:0};
    if (!dati[b]) dati[b] = {p:0,gf:0,gs:0};

    dati[a].gf += gA; dati[a].gs += gB;
    dati[b].gf += gB; dati[b].gs += gA;

    if (gA > gB) dati[a].p += 3;
    else if (gA < gB) dati[b].p += 3;
    else { dati[a].p += 1; dati[b].p += 1; }

    localStorage.setItem("smg", JSON.stringify(dati));
    mostra();
}

function mostra() {
    let t = document.getElementById("classifica");
    t.innerHTML = "<tr><th>Squadra</th><th>Punti</th><th>GF</th><th>GS</th><th>DR</th></tr>";

    Object.entries(dati)
    .sort((a,b)=>{
        if (b[1].p !== a[1].p) return b[1].p - a[1].p;
        return (b[1].gf - b[1].gs) - (a[1].gf - a[1].gs);
    })
    .forEach((s,i)=>{
        let dr = s[1].gf - s[1].gs;
        let colore = i < 8 ? "#d4edda" : "white";

        t.innerHTML += `<tr style="background:${colore}">
        <td>${s[0]}</td>
        <td>${s[1].p}</td>
        <td>${s[1].gf}</td>
        <td>${s[1].gs}</td>
        <td>${dr}</td>
        </tr>`;
    });
}

function resetta() {
    if (confirm("Sei sicuro di voler cancellare tutto?")) {
        localStorage.removeItem("smg");
        dati = {};
        mostra();
    }
}

mostra();
</script>

</body>
</html>
